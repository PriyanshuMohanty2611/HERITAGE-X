services:
  # ─── FRONTEND: Next.js SaaS Node ─────────
  - type: web
    name: heritage-ai-frontend
    runtime: node
    plan: free
    region: singapore
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm run start
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: NEXT_PUBLIC_API_URL
        value: https://heritage-ai-backend.onrender.com

  # ─── BACKEND: FastAPI Neural Matrix ──────
  - type: web
    name: heritage-ai-backend
    runtime: python
    plan: free
    region: singapore
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 10000
